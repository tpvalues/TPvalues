<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TP Values — Your Results</title>

  <link rel="icon" type="image/png" href="tplogo.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0f121a;
      --text: #e0e7ff;
      --card: #1e293b;
      --border: #334155;
      --accent: #ff8533;
      --positive: #4caf50;
      --negative: #ef5350;
      --neutral: #757575;
      --logo-bg-normal: #f8f9fc;
      --logo-bg-dark: #2d2d2d;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Lexend', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 5rem 1rem 3rem;
    }

    .brand-fixed {
      position: fixed;
      top: 20px; left: 20px;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(15,18,26,0.7);
      padding: 8px 14px 8px 8px;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      backdrop-filter: blur(6px);
    }

    .brand-fixed img {
      width: 56px; height: 56px;
      border-radius: 10px;
      object-fit: cover;
    }

    .brand-text {
      color: white;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.6);
      white-space: nowrap;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      text-align: center;
    }

    h1 {
      font-size: 3.2rem;
      font-weight: 700;
      margin-bottom: 0.8rem;
      color: white;
    }

    .subtitle {
      font-size: 1.4rem;
      color: #94a3b8;
      margin-bottom: 2rem;
    }

    .match-section {
      margin: 1rem auto 3rem;
      max-width: 680px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .match-title {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 1.2rem;
      color: #fff;
    }

    .party-logo-container {
      width: 160px;
      height: 160px;
      margin: 1.2rem auto;
      border: 3px solid var(--accent);
      border-radius: 16px;
      overflow: hidden;
      display: block;
    }

    .party-logo {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .normal-bg   { background: var(--logo-bg-normal); }
    .dark-bg     { background: var(--logo-bg-dark); }

    .party-name {
      font-size: 2.1rem;
      font-weight: 700;
      color: var(--accent);
      margin: 0.8rem 0 0.4rem;
    }

    .match-percent {
      font-size: 1.4rem;
      font-weight: 500;
      color: #94a3b8;
      margin-bottom: 1.5rem;
    }

    .party-desc {
      font-size: 1.15rem;
      line-height: 1.65;
      color: #cbd5e1;
    }

    .chart-container {
      margin: 0 auto 4rem;
      max-width: 680px;
      background: #f8f9fc;
      border-radius: 16px;
      padding: 1.4rem;
      box-shadow: 0 8px 28px rgba(0,0,0,0.4);
      border: 1px solid #e2e8f0;
      position: relative;
      display: inline-block;
    }

    .chart-container img {
      width: 100%;
      height: auto;
      border-radius: 12px;
      display: block;
    }

    .compass-dot {
      position: absolute;
      width: 22px;
      height: 22px;
      background: #ff8533;
      border: 4px solid white;
      border-radius: 50%;
      box-shadow: 0 0 15px rgba(255,133,51,0.9);
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .trad-dot {
      position: absolute;
      width: 18px;
      height: 18px;
      background: #4caf50;
      border: 3px solid white;
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(76,175,80,0.8);
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .faith-dot {
      position: absolute;
      width: 18px;
      height: 18px;
      background: #ef5350;
      border: 3px solid white;
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(239,83,80,0.8);
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.8rem;
      margin: 3rem 0;
    }

    .axis-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.6rem;
      box-shadow: 0 6px 20px rgba(0,0,0,0.35);
    }

    .axis-name {
      font-size: 1.45rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 0.8rem;
    }

    .axis-score {
      font-size: 2.4rem;
      font-weight: 700;
      margin: 0.6rem 0;
    }

    .positive { color: var(--positive); }
    .negative { color: var(--negative); }
    .neutral  { color: var(--neutral); }

    .restart-btn {
      display: inline-block;
      margin-top: 3.5rem;
      padding: 1rem 2.8rem;
      font-size: 1.3rem;
      font-weight: 600;
      color: white;
      background: linear-gradient(90deg, var(--accent), #e06c00);
      border: none;
      border-radius: 999px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.25s ease;
      box-shadow: 0 8px 24px rgba(255,133,51,0.3);
    }

    .restart-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 36px rgba(255,133,51,0.5);
    }
  </style>
</head>
<body>

  <div class="brand-fixed">
    <img src="tplogo.png" alt="TP Values Logo">
    <span class="brand-text">TP Values</span>
  </div>

  <div class="container">
    <h1>Your Results</h1>
    <p class="subtitle">Third Position Ideology Profile</p>

    <div class="match-section">
      <div class="match-title">Your Closest Ideological Match</div>
      <div id="logoContainer" class="party-logo-container normal-bg">
        <img id="matchLogo" src="https://via.placeholder.com/160/333/ccc?text=No+Logo" alt="Ideology Logo" class="party-logo">
      </div>
      <div id="matchName" class="party-name">Analyzing...</div>
      <div id="matchPercent" class="match-percent"></div>
      <p id="matchDesc" class="party-desc">Your results are being compared...</p>
    </div>

    <div class="chart-container">
      <img src="tpchart.png" alt="TP Values Compass Chart">

      <!-- Main compass dot (State Interference + Ownership) -->
      <div id="mainDot" class="compass-dot"></div>

      <!-- Tradition bar dot -->
      <div id="traditionDot" class="trad-dot"></div>

      <!-- Faith bar dot -->
      <div id="faithDot" class="faith-dot"></div>
    </div>

    <div class="results-grid" id="resultsGrid"></div>

    <a href="index.html" class="restart-btn">Take the Test Again</a>
  </div>

  <script src="ideologies.js"></script>

  <script>
    // Load user scores
    const saved = localStorage.getItem("scores");
    if (!saved) {
      window.location.href = "index.html";
    }
    const userScores = JSON.parse(saved);

    // Show axis results
    const axisDisplay = {
      interference: "State Interference",
      ownership:    "Ownership Structure",
      tradition:    "Tradition vs Modernity",
      faith:        "Role of Faith / Secularism"
    };

    const grid = document.getElementById("resultsGrid");
    Object.entries(userScores).forEach(([key, value]) => {
      const card = document.createElement("div");
      card.className = "axis-card";

      const name = document.createElement("div");
      name.className = "axis-name";
      name.textContent = axisDisplay[key] || key;

      const scoreEl = document.createElement("div");
      scoreEl.className = "axis-score";
      scoreEl.textContent = value >= 0 ? `+${value}` : value;

      if (value > 15) scoreEl.classList.add("positive");
      if (value < -15) scoreEl.classList.add("negative");
      if (Math.abs(value) <= 15) scoreEl.classList.add("neutral");

      card.append(name, scoreEl);
      grid.appendChild(card);
    });

    // Find closest match
    let closest = null;
    let minDistance = Infinity;

    ideologies.forEach(ideology => {
      let dist = 0;
      Object.keys(userScores).forEach(axis => {
        const diff = userScores[axis] - (ideology.scores[axis] || 0);
        dist += diff * diff;
      });
      if (dist < minDistance) {
        minDistance = dist;
        closest = ideology;
      }
    });

    // Calculate percentage
    let percent = 0;
    if (closest) {
      const maxDist = Math.sqrt(4 * 200 * 200);
      percent = Math.round(100 - (Math.sqrt(minDistance) / maxDist) * 100);
      percent = Math.max(0, Math.min(100, percent));
    }

    // Display closest match
    if (closest) {
      const logoEl = document.getElementById("matchLogo");
      const container = document.getElementById("logoContainer");

      logoEl.src = closest.img || "https://via.placeholder.com/160/333/ccc?text=No+Logo";
      logoEl.alt = closest.name + " logo";

      const special = ["Iron Guard", "National Synarchist Union", "National Radical Camp", "Sansepolcrismo"];
      if (special.includes(closest.name)) {
        container.classList.remove("normal-bg");
        container.classList.add("dark-bg");
      } else {
        container.classList.remove("dark-bg");
        container.classList.add("normal-bg");
      }

      document.getElementById("matchName").textContent = closest.name;
      document.getElementById("matchPercent").textContent = `${percent}% compatibility`;
      document.getElementById("matchDesc").textContent = closest.description;
    } else {
      document.getElementById("matchName").textContent = "No match found";
      document.getElementById("matchPercent").textContent = "";
      document.getElementById("matchDesc").textContent = "There was an issue matching your profile.";
    }

    // ==================== DOT POSITIONING ON YOUR CHART ====================
    // Calibrated to your PNG: main square center ≈ (380, 280), half-size ≈ 340 px
    // Tradition bar center X ≈ 700 px, Faith bar center X ≈ 760 px
    // Vertical bars half-height ≈ 240 px (from top = +100 to bottom = -100)

    const stateScore = userScores.interference || 0;   // X: left=-100 → right=+100
    const ownerScore = userScores.ownership || 0;      // Y: bottom=-100 → top=+100
    const tradScore  = userScores.tradition || 0;
    const faithScore = userScores.faith || 0;

    // Main compass dot
    const mainDot = document.getElementById("mainDot");
    const mainX = 380 + (stateScore / 100) * 340;      // center 380, half 340
    const mainY = 280 - (ownerScore / 100) * 340;      // Y inverted (top = positive)
    mainDot.style.left = mainX + "px";
    mainDot.style.top  = mainY + "px";
    mainDot.style.display = "block";

    // Tradition bar dot (orange bar)
    const traditionDot = document.getElementById("traditionDot");
    const tradY = 280 - (tradScore / 100) * 240;       // center Y 280, half-height 240
    traditionDot.style.left = "700px";
    traditionDot.style.top  = tradY + "px";
    traditionDot.style.display = "block";

    // Faith bar dot (green bar)
    const faithDot = document.getElementById("faithDot");
    const faithY = 280 - (faithScore / 100) * 240;
    faithDot.style.left = "760px";
    faithDot.style.top  = faithY + "px";
    faithDot.style.display = "block";
  </script>

</body>
</html>
