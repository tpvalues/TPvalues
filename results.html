<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TP Values — Your Results</title>

  <link rel="icon" type="image/png" href="tplogo.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0f121a;
      --text: #e0e7ff;
      --card: #1e293b;
      --border: #334155;
      --accent: #ff8533;
      --positive: #4caf50;
      --negative: #ef5350;
      --neutral: #757575;
      --logo-bg-normal: #f8f9fc;
      --logo-bg-dark: #2d2d2d;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Lexend', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 5rem 1rem 3rem;
    }

    .brand-fixed {
      position: fixed;
      top: 20px; left: 20px;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(15,18,26,0.7);
      padding: 8px 14px 8px 8px;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      backdrop-filter: blur(6px);
    }

    .brand-fixed img {
      width: 56px; height: 56px;
      border-radius: 10px;
      object-fit: cover;
    }

    .brand-text {
      color: white;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.6);
      white-space: nowrap;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      text-align: center;
    }

    h1 {
      font-size: 3.2rem;
      font-weight: 700;
      margin-bottom: 0.8rem;
      color: white;
    }

    .subtitle {
      font-size: 1.4rem;
      color: #94a3b8;
      margin-bottom: 2rem;
    }

    .match-section {
      margin: 1rem auto 3rem;
      max-width: 680px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .match-title {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 1.2rem;
      color: #fff;
    }

    .party-logo-container {
      width: 160px;
      height: 160px;
      margin: 1.2rem auto;
      border: 3px solid var(--accent);
      border-radius: 16px;
      overflow: hidden;
      display: block;
    }

    .party-logo {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .normal-bg   { background: var(--logo-bg-normal); }
    .dark-bg     { background: var(--logo-bg-dark); }

    .party-name {
      font-size: 2.1rem;
      font-weight: 700;
      color: var(--accent);
      margin: 0.8rem 0 0.4rem;
    }

    .match-percent {
      font-size: 1.4rem;
      font-weight: 500;
      color: #94a3b8;
      margin-bottom: 1.5rem;
    }

    .party-desc {
      font-size: 1.15rem;
      line-height: 1.65;
      color: #cbd5e1;
    }

    .chart-container {
      margin: 0 auto 4rem;
      max-width: 680px;
      background: #f8f9fc;
      border-radius: 16px;
      padding: 1.4rem;
      box-shadow: 0 8px 28px rgba(0,0,0,0.4);
      border: 1px solid #e2e8f0;
    }

    #banner {
      width: 100%;
      height: auto;
      border-radius: 12px;
      display: block;
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.8rem;
      margin: 3rem 0;
    }

    .axis-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.6rem;
      box-shadow: 0 6px 20px rgba(0,0,0,0.35);
    }

    .axis-name {
      font-size: 1.45rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 0.8rem;
    }

    .axis-score {
      font-size: 2.4rem;
      font-weight: 700;
      margin: 0.6rem 0;
    }

    .positive { color: var(--positive); }
    .negative { color: var(--negative); }
    .neutral  { color: var(--neutral); }

    .restart-btn {
      display: inline-block;
      margin-top: 3.5rem;
      padding: 1rem 2.8rem;
      font-size: 1.3rem;
      font-weight: 600;
      color: white;
      background: linear-gradient(90deg, var(--accent), #e06c00);
      border: none;
      border-radius: 999px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.25s ease;
      box-shadow: 0 8px 24px rgba(255,133,51,0.3);
    }

    .restart-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 36px rgba(255,133,51,0.5);
    }
  </style>
</head>
<body>

  <div class="brand-fixed">
    <img src="tplogo.png" alt="TP Values Logo">
    <span class="brand-text">TP Values</span>
  </div>

  <div class="container">
    <h1>Your Results</h1>
    <p class="subtitle">Third Position Ideology Profile</p>

    <div class="match-section">
      <div class="match-title">Your Closest Ideological Match</div>
      <div id="logoContainer" class="party-logo-container normal-bg">
        <img id="matchLogo" src="https://via.placeholder.com/160/333/ccc?text=No+Logo" alt="Ideology Logo" class="party-logo">
      </div>
      <div id="matchName" class="party-name">Analyzing...</div>
      <div id="matchPercent" class="match-percent"></div>
      <p id="matchDesc" class="party-desc">Your results are being compared...</p>
    </div>

    <div class="chart-container">
      <img id="banner" src="" alt="Your Position on TP Values Chart">
    </div>

    <div class="results-grid" id="resultsGrid"></div>

    <a href="index.html" class="restart-btn">Take the Test Again</a>
  </div>

  <script src="ideologies.js"></script>

  <script>
    // Load user scores
    const saved = localStorage.getItem("scores");
    if (!saved) window.location.href = "index.html";
    const userScores = JSON.parse(saved);

    // Show axis results
    const axisDisplay = {
      interference: "State Interference",
      ownership:    "Ownership Structure",
      tradition:    "Tradition vs Modernity",
      faith:        "Role of Faith / Secularism"
    };

    const grid = document.getElementById("resultsGrid");
    Object.entries(userScores).forEach(([key, value]) => {
      const card = document.createElement("div");
      card.className = "axis-card";
      const name = document.createElement("div");
      name.className = "axis-name";
      name.textContent = axisDisplay[key] || key;
      const scoreEl = document.createElement("div");
      scoreEl.className = "axis-score";
      scoreEl.textContent = value >= 0 ? `+${value}` : value;
      if (value > 15) scoreEl.classList.add("positive");
      if (value < -15) scoreEl.classList.add("negative");
      if (Math.abs(value) <= 15) scoreEl.classList.add("neutral");
      card.append(name, scoreEl);
      grid.appendChild(card);
    });

    // Find closest match
    let closest = null;
    let minDistance = Infinity;
    ideologies.forEach(ideology => {
      let dist = 0;
      Object.keys(userScores).forEach(axis => {
        const diff = userScores[axis] - (ideology.scores[axis] || 0);
        dist += diff * diff;
      });
      if (dist < minDistance) {
        minDistance = dist;
        closest = ideology;
      }
    });

    let percent = 0;
    if (closest) {
      const maxDist = Math.sqrt(4 * 200 * 200);
      percent = Math.round(100 - (Math.sqrt(minDistance) / maxDist) * 100);
      percent = Math.max(0, Math.min(100, percent));
    }

    if (closest) {
      const logoEl = document.getElementById("matchLogo");
      const container = document.getElementById("logoContainer");
      logoEl.src = closest.img || "https://via.placeholder.com/160/333/ccc?text=No+Logo";
      const special = ["Iron Guard", "National Synarchist Union", "National Radical Camp", "Sansepolcrismo"];
      if (special.includes(closest.name)) {
        container.classList.remove("normal-bg");
        container.classList.add("dark-bg");
      } else {
        container.classList.remove("dark-bg");
        container.classList.add("normal-bg");
      }
      document.getElementById("matchName").textContent = closest.name;
      document.getElementById("matchPercent").textContent = `${percent}% compatibility`;
      document.getElementById("matchDesc").textContent = closest.description;
    }

    // ==================== CANVAS DOT DRAWING (all black dots) ====================
    window.onload = function() {
      const background = new Image();
      background.crossOrigin = "anonymous";
      background.onload = function() {
        const c = document.createElement("canvas");
        c.width = background.width;
        c.height = background.height;
        const ctx = c.getContext("2d");

        // Draw the base chart
        ctx.drawImage(background, 0, 0);

        // User scores
        const state = userScores.interference || 0;   // X: -100 left → +100 right
        const owner = userScores.ownership || 0;      // Y: -100 bottom → +100 top
        const trad  = userScores.tradition || 0;
        const faith = userScores.faith || 0;

        // Black dot style
        const dotColor = "#000000";
        const dotStroke = "#ffffff";
        const dotStrokeWidth = 4;

        // Main square dot
        const cx = 600;
        const cy = 600;
        const half = 520;
        const dotX = cx + (state / 100) * half;
        const dotY = cy - (owner / 100) * half;

        ctx.beginPath();
        ctx.arc(dotX, dotY, 25, 0, 2 * Math.PI);
        ctx.fillStyle = dotColor;
        ctx.fill();
        ctx.lineWidth = dotStrokeWidth;
        ctx.strokeStyle = dotStroke;
        ctx.stroke();

        // Tradition vertical dot
        const tradX = 1315;
        const tradYPos = 600 - (trad / 100) * half;

        ctx.beginPath();
        ctx.arc(tradX, tradYPos, 20, 0, 2 * Math.PI);
        ctx.fillStyle = dotColor;
        ctx.fill();
        ctx.lineWidth = dotStrokeWidth;
        ctx.strokeStyle = dotStroke;
        ctx.stroke();

        // Faith vertical dot
        const faithX = 1515;
        const faithYPos = 600 - (faith / 100) * half;

        ctx.beginPath();
        ctx.arc(faithX, faithYPos, 20, 0, 2 * Math.PI);
        ctx.fillStyle = dotColor;
        ctx.fill();
        ctx.lineWidth = dotStrokeWidth;
        ctx.strokeStyle = dotStroke;
        ctx.stroke();

        // Output to img
        document.getElementById("banner").src = c.toDataURL("image/png");
      };

      background.src = "tpchart.png";
    };
  </script>

</body>
</html>
