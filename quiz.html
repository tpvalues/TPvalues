<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TP Values — Quiz</title>

  <link rel="icon" type="image/png" href="tplogo.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0f121a;
      --text: #e0e7ff;
      --card: #1e293b;
      --border: #334155;
      --accent: #ff8533;
      --question-bg: #171b26;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Lexend', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 5rem 1rem 2rem;
    }

    .brand-fixed {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(15, 18, 26, 0.7);
      padding: 8px 14px 8px 8px;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      backdrop-filter: blur(6px);
      transition: all 0.3s ease;
    }

    .brand-fixed img {
      width: 56px;
      height: 56px;
      border-radius: 10px;
      object-fit: cover;
      display: block;
    }

    .brand-text {
      color: white;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.6);
      white-space: nowrap;
    }

    .quiz-container {
      max-width: 740px;
      width: 100%;
      margin: 0 auto;
      text-align: center;
    }

    .question-header {
      margin-bottom: 2.2rem;
    }

    .question-number {
      font-size: 1.65rem;
      font-weight: 600;
      color: #cbd5e1;
      margin-bottom: 1rem;
      letter-spacing: 0.6px;
    }

    .question-box {
      background: var(--question-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.8rem 2rem;
      margin: 0 auto 3.8rem;
      max-width: 100%;
      box-shadow: 0 6px 22px rgba(0,0,0,0.35);
    }

    h2#questionText {
      font-size: 2.1rem;
      font-weight: 500;
      line-height: 1.45;
      color: #f0f4ff;
    }

    #answers {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      margin: 0 auto 2.5rem;
      max-width: 460px;
    }

    .answer-btn {
      font-family: 'Lexend', sans-serif;
      font-size: 1.18rem;
      font-weight: 600;
      color: white;
      padding: 0.95rem 1.8rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.22s ease;
      box-shadow: 0 5px 16px rgba(0,0,0,0.38);
      letter-spacing: 0.2px;
    }

    .answer-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 9px 24px rgba(0,0,0,0.52);
    }

    .answer-btn:active {
      transform: translateY(0);
    }

    #btn-strong-agree   { background: #2e7d32; }
    #btn-agree          { background: #4caf50; }
    #btn-neutral        { background: #757575; }
    #btn-disagree       { background: #ef5350; }
    #btn-strong-disagree{ background: #d32f2f; }

    #btn-back {
      font-size: 1.1rem;
      font-weight: 500;
      color: #cbd5e1;
      background: transparent;
      border: 1px solid #555;
      padding: 0.85rem 2rem;
      border-radius: 999px;
      margin-top: 1.2rem;
      cursor: pointer;
      transition: all 0.22s ease;
    }

    #btn-back:hover {
      background: rgba(255,255,255,0.07);
      border-color: #777;
    }

    #btn-back:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <div class="brand-fixed">
    <img src="tplogo.png" alt="TP Values Logo">
    <span class="brand-text">TP Values</span>
  </div>

  <div class="quiz-container">
    <div class="question-header">
      <div class="question-number" id="questionNumber"></div>
    </div>

    <div class="question-box">
      <h2 id="questionText"></h2>
    </div>

    <div id="answers">
      <button id="btn-strong-agree"   class="answer-btn" onclick="answer(2)">Strongly Agree</button>
      <button id="btn-agree"          class="answer-btn" onclick="answer(1)">Agree</button>
      <button id="btn-neutral"        class="answer-btn" onclick="answer(0)">Neutral / Unsure</button>
      <button id="btn-disagree"       class="answer-btn" onclick="answer(-1)">Disagree</button>
      <button id="btn-strong-disagree"class="answer-btn" onclick="answer(-2)">Strongly Disagree</button>
    </div>

    <button id="btn-back" onclick="goBack()">Back</button>
  </div>

  <script src="questions.js"></script>
  <script>
    let currentQuestion = 0;
    let scores = {
      interference: 0,
      ownership: 0,
      tradition: 0,
      faith: 0
    };
    let answersHistory = [];

    function showQuestion() {
      if (currentQuestion >= questions.length) {
        localStorage.setItem("scores", JSON.stringify(scores));
        window.location.href = "results.html";
        return;
      }

      let q = questions[currentQuestion];
      document.getElementById("questionNumber").innerText = `Question ${currentQuestion + 1} of ${questions.length}`;
      document.getElementById("questionText").innerText = q.text;

      document.getElementById("btn-back").disabled = (currentQuestion === 0);

      let prev = answersHistory[currentQuestion];
      if (prev !== undefined) {
        highlightSelected(prev);
      } else {
        clearHighlight();
      }
    }

    function highlightSelected(value) {
      clearHighlight();
      let btnId;
      if (value === 2)    btnId = "btn-strong-agree";
      else if (value === 1)  btnId = "btn-agree";
      else if (value === 0)  btnId = "btn-neutral";
      else if (value === -1) btnId = "btn-disagree";
      else if (value === -2) btnId = "btn-strong-disagree";

      if (btnId) {
        document.getElementById(btnId).style.boxShadow = "0 0 0 4px rgba(255, 255, 255, 0.25)";
      }
    }

    function clearHighlight() {
      document.querySelectorAll(".answer-btn").forEach(btn => {
        btn.style.boxShadow = "0 5px 16px rgba(0,0,0,0.38)";
      });
    }

    function answer(value) {
      let q = questions[currentQuestion];

      answersHistory[currentQuestion] = value;
      scores[q.axis] += value * q.direction;

      currentQuestion++;
      showQuestion();
    }

    function goBack() {
      if (currentQuestion > 0) {
        currentQuestion--;
        showQuestion();
      }
    }

    showQuestion();
  </script>

</body>
</html>
